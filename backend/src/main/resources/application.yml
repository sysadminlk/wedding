spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 8080

spring.datasource:
  url: jdbc:postgresql://localhost:5432/weddingwire
  username: postgres
  password: postgres
  hikari:
    maximum-pool-size: 20
    minimum-idle: 5

spring.jpa:
  hibernate:
    ddl-auto: validate
  show-sql: true
  properties:
    hibernate:
      format_sql: true

spring.flyway:
  enabled: true
  locations: classpath:db/migration

jwt:
  secret: dev-secret-change-in-production-at-least-32-chars
  access-expiration-ms: 3600000
  refresh-expiration-ms: 604800000

app:
  jwt:
    secret: dev-secret-change-in-production-at-least-32-chars
    expiration: 86400000

  s3:
    endpoint: http://localhost:9000
    bucket: weddingwire
    access-key: minioadmin
    secret-key: minioadmin
    path-style: true

  email:
    provider: smtp
    smtp:
      host: localhost
      port: 1025
      username: ""
      password: ""

  payhere:
    merchant-id: sandbox
    secret: sandbox
    sandbox: true

  demo:
    enabled: true
    reset-cron: "0 0 2 * * *"

---
spring:
  config:
    activate:
      on-profile: production

server:
  port: 8080

spring.datasource:
  url: ${SPRING_DATASOURCE_URL}
  username: ${SPRING_DATASOURCE_USERNAME}
  password: ${SPRING_DATASOURCE_PASSWORD}
  hikari:
    maximum-pool-size: 50
    minimum-idle: 10

spring.jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false

spring.flyway:
  enabled: true
  locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

  s3:
    endpoint: ${AWS_S3_ENDPOINT:https://s3.amazonaws.com}
    bucket: ${AWS_S3_BUCKET:weddingwire}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    path-style: false

  email:
    provider: ${EMAIL_PROVIDER:resend}
    resend:
      api-key: ${RESEND_API_KEY}
      from-name: weddingWire
      from-email: ${EMAIL_FROM:noreply@weddingwire.com}
    smtp:
      host: ${SMTP_HOST}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      from: ${EMAIL_FROM:noreply@weddingwire.com}

  payhere:
    merchant-id: ${PAYHERE_MERCHANT_ID}
    secret: ${PAYHERE_SECRET}
    sandbox: ${PAYHERE_SANDBOX:false}

  demo:
    enabled: false
