name: weddingwire_mobile
description: weddingWire Wedding Planning Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State Management
  flutter_riverpod: ^2.4.9
  # Navigation
  go_router: ^14.2.0
  # HTTP
  dio: ^5.4.1
  # Storage
  flutter_secure_storage: ^9.0.0
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
